        function buildTable() {
            const tbody = document.getElementById('ganttBodyDev');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-section ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    // 3 fixed cols + 6 week cols = 9
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'cell-week ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : 'row-activity';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'cell-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'cell-label' + (isHito ? ' hito-label' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type
                const tdT = document.createElement('td');
                tdT.className = 'cell-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `type-badge type-${row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 6 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'cell-week ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        bar.className = isHito ? 'bar bar-HITO' : `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-desarrollo .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-desarrollo .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-section[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyDev tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-section')) return;
                const t = tr.dataset.type;
                // HITO rows always show when filter is ALL or HITO; hide for other specific filters
                const match = f === 'ALL'
                    || t === f
                    || (f === 'HITO' && t === 'HITO');
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            rows.forEach(tr => {
                if (!tr.classList.contains('row-section')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-section')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-dev').innerHTML = `<strong>${visible}</strong> actividades visibles`;
        }

        buildTable();
        

            window.renderGanttDev = function() { buildTable(); applyFilter(currentFilter); };

        function buildTable() {
            const tbody = document.getElementById('ganttBodyImp');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-sec ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'c-wk ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const isIntern = row.type === 'INTERN';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : isIntern ? 'row-intern row-act' : 'row-act';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'c-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'c-lbl' + (isHito ? ' lbl-hito' : isIntern ? ' lbl-intern' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type badge
                const tdT = document.createElement('td');
                tdT.className = 'c-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `badge b-${isIntern ? 'INTERN' : row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 8 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'c-wk ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        if (isHito) bar.className = 'bar bar-HITO';
                        else if (isIntern) bar.className = 'bar bar-INTERN';
                        else bar.className = `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-implementacion .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-implementacion .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-sec[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyImp tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-sec')) return;
                const t = tr.dataset.type;
                // PERS filter also shows CARGA; HITO always shows with ALL
                const match = f === 'ALL'
                    || t === f
                    || (f === 'PERS' && (t === 'PERS' || t === 'CARGA'));
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            // hide empty section headers
            rows.forEach(tr => {
                if (!tr.classList.contains('row-sec')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-sec')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-imp').innerHTML = `<strong>${visible}</strong> de 85 actividades`;
        }

        buildTable();
        

            window.renderGanttImp = function() { buildTable(); applyFilter(currentFilter); };

            setSidebarCollapsed(!sidebarEl.classList.contains('collapsed'));
        });

        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', toggleAllSections);
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        
        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', window.toggleAllSections || function() {}); // Use global toggle if exists, but we know it's there
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        function buildTable() {
            const tbody = document.getElementById('ganttBodyDev');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-section ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    // 3 fixed cols + 6 week cols = 9
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'cell-week ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : 'row-activity';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'cell-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'cell-label' + (isHito ? ' hito-label' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type
                const tdT = document.createElement('td');
                tdT.className = 'cell-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `type-badge type-${row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 6 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'cell-week ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        bar.className = isHito ? 'bar bar-HITO' : `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-desarrollo .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-desarrollo .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-section[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyDev tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-section')) return;
                const t = tr.dataset.type;
                // HITO rows always show when filter is ALL or HITO; hide for other specific filters
                const match = f === 'ALL'
                    || t === f
                    || (f === 'HITO' && t === 'HITO');
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            rows.forEach(tr => {
                if (!tr.classList.contains('row-section')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-section')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-dev').innerHTML = `<strong>${visible}</strong> actividades visibles`;
        }

        buildTable();
        

            window.renderGanttDev = function() { buildTable(); applyFilter(currentFilter); };
        })();

                const btn = table.querySelector('.js-toggle-all');

                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        
        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', window.toggleAllSections || function() {}); // Use global toggle if exists, but we know it's there
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        function buildTable() {
            const tbody = document.getElementById('ganttBodyImp');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-sec ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'c-wk ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const isIntern = row.type === 'INTERN';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : isIntern ? 'row-intern row-act' : 'row-act';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'c-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'c-lbl' + (isHito ? ' lbl-hito' : isIntern ? ' lbl-intern' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type badge
                const tdT = document.createElement('td');
                tdT.className = 'c-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `badge b-${isIntern ? 'INTERN' : row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 8 week cells

        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-sec[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyImp tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-sec')) return;
                const t = tr.dataset.type;
                // PERS filter also shows CARGA; HITO always shows with ALL
                const match = f === 'ALL'
                    || t === f
                    || (f === 'PERS' && (t === 'PERS' || t === 'CARGA'));
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            // hide empty section headers
            rows.forEach(tr => {
                if (!tr.classList.contains('row-sec')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-sec')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-imp').innerHTML = `<strong>${visible}</strong> de 85 actividades`;
        }

        buildTable();
        

            window.renderGanttImp = function() { buildTable(); applyFilter(currentFilter); };

        sidebarToggleBtn.addEventListener('click', () => {
            setSidebarCollapsed(!sidebarEl.classList.contains('collapsed'));
        });

            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', toggleAllSections);
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        
        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', window.toggleAllSections || function() {}); // Use global toggle if exists, but we know it's there
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        function buildTable() {
            const tbody = document.getElementById('ganttBodyDev');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-section ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    // 3 fixed cols + 6 week cols = 9
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'cell-week ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : 'row-activity';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'cell-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'cell-label' + (isHito ? ' hito-label' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type
                const tdT = document.createElement('td');
                tdT.className = 'cell-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `type-badge type-${row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 6 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'cell-week ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        bar.className = isHito ? 'bar bar-HITO' : `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-desarrollo .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-desarrollo .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-section[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyDev tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-section')) return;
                const t = tr.dataset.type;
                // HITO rows always show when filter is ALL or HITO; hide for other specific filters
                const match = f === 'ALL'
                    || t === f
                    || (f === 'HITO' && t === 'HITO');
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            rows.forEach(tr => {
                if (!tr.classList.contains('row-section')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-section')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-dev').innerHTML = `<strong>${visible}</strong> actividades visibles`;
        }

        buildTable();
        

            window.renderGanttDev = function() { buildTable(); applyFilter(currentFilter); };
        })();

            }, 50);

        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', window.toggleAllSections || function() {}); // Use global toggle if exists, but we know it's there
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        function buildTable() {
            const tbody = document.getElementById('ganttBodyImp');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-sec ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'c-wk ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const isIntern = row.type === 'INTERN';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : isIntern ? 'row-intern row-act' : 'row-act';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'c-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'c-lbl' + (isHito ? ' lbl-hito' : isIntern ? ' lbl-intern' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type badge
                const tdT = document.createElement('td');
                tdT.className = 'c-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `badge b-${isIntern ? 'INTERN' : row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 8 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'c-wk ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        if (isHito) bar.className = 'bar bar-HITO';
                        else if (isIntern) bar.className = 'bar bar-INTERN';
                        else bar.className = `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-implementacion .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-implementacion .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-sec[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyImp tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-sec')) return;
                const t = tr.dataset.type;
                // PERS filter also shows CARGA; HITO always shows with ALL
                const match = f === 'ALL'
                    || t === f
                    || (f === 'PERS' && (t === 'PERS' || t === 'CARGA'));
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            // hide empty section headers
            rows.forEach(tr => {
                if (!tr.classList.contains('row-sec')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-sec')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-imp').innerHTML = `<strong>${visible}</strong> de 85 actividades`;
        }

        buildTable();
        

            window.renderGanttImp = function() { buildTable(); applyFilter(currentFilter); };
        })();

        // ── SIDEBAR TOGGLE (shared across both views) ───────────────────────────────
        const sidebarEl = document.querySelector('.sidebar');
        const sidebarToggleBtn = document.getElementById('sidebarToggle');
        function setSidebarCollapsed(collapsed) {
            sidebarEl.classList.toggle('collapsed', collapsed);
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            try { localStorage.setItem('tideoSidebarCollapsed', collapsed ? '1' : '0'); } catch (e) {}
        }
        let storedCollapsed = false;
        try { storedCollapsed = localStorage.getItem('tideoSidebarCollapsed') === '1'; } catch (e) {}
        setSidebarCollapsed(storedCollapsed);
        sidebarToggleBtn.addEventListener('click', () => {
            setSidebarCollapsed(!sidebarEl.classList.contains('collapsed'));
        });

        switchView('implementacion');
    </script>

                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');

                    btn.addEventListener('click', toggleAllSections);
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        
        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {

                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-section ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    // 3 fixed cols + 6 week cols = 9
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');

                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : 'row-activity';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'cell-label' + (isHito ? ' hito-label' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type
                const tdT = document.createElement('td');
                tdT.className = 'cell-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `type-badge type-${row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 6 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'cell-week ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        bar.className = isHito ? 'bar bar-HITO' : `bar bar-${row.type}`;

        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-desarrollo .filter-btn').forEach(btn => {

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-section[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyDev tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-section')) return;
                const t = tr.dataset.type;
                // HITO rows always show when filter is ALL or HITO; hide for other specific filters
                const match = f === 'ALL'
                    || t === f
                    || (f === 'HITO' && t === 'HITO');
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            rows.forEach(tr => {
                if (!tr.classList.contains('row-section')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-section')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-dev').innerHTML = `<strong>${visible}</strong> actividades visibles`;

        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', toggleAllSections);
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        
        function attachToggleToTable(tbody) {
            setTimeout(() => {
                if (!tbody) return;
                const table = tbody.closest('table');
                if (!table) return;
                const btn = table.querySelector('.js-toggle-all');
                if (btn && !btn.dataset.listenerAttached) {
                    btn.addEventListener('click', window.toggleAllSections || function() {}); // Use global toggle if exists, but we know it's there
                    btn.dataset.listenerAttached = 'true';
                }
            }, 50);
        }

        function buildTable() {
            const tbody = document.getElementById('ganttBodyImp');
            tbody.innerHTML = '';
            attachToggleToTable(tbody);
            let currentSection = null;
            const sectionWeeks = {};
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    if (!sectionWeeks[currentSection]) sectionWeeks[currentSection] = [];
                } else if (currentSection && row.weeks) {
                    row.weeks.forEach((w, i) => {
                        if (w) sectionWeeks[currentSection][i] = 1;
                    });
                }
            });
            currentSection = null;
            ROWS.forEach(row => {
                if (row.section) {
                    currentSection = row.section;
                    const sec = SECTIONS[row.section];
                    const tr = document.createElement('tr');
                    tr.className = 'row-sec ' + (sec.cls || '');
                    tr.dataset.section = row.section;
                    const tdLabel = document.createElement('td');
                    tdLabel.colSpan = 3;
                    tdLabel.innerHTML = `<span class="sec-toggle">▾</span>${sec.label}`;
                    tr.appendChild(tdLabel);
                    const sWeeks = sectionWeeks[row.section] || [];
                    for (let wi = 0; wi < 10; wi++) {
                        const td = document.createElement('td');
                        td.className = 'c-wk ' + WK_CLS[wi];
                        if (sWeeks[wi]) {
                            const bar = document.createElement('span');
                            bar.className = 'bar bar-INTERN';
                            bar.style.opacity = '0.5';
                            td.appendChild(bar);
                        }
                        tr.appendChild(td);
                    }
                    tr.addEventListener('click', () => toggleSection(row.section));
                    tbody.appendChild(tr);
                    return;
                }
                const isHito = row.type === 'HITO';
                const isIntern = row.type === 'INTERN';
                const tr = document.createElement('tr');
                tr.className = isHito ? 'row-hito' : isIntern ? 'row-intern row-act' : 'row-act';
                tr.dataset.type = row.type;
                tr.dataset.id = row.id;
                tr.dataset.section = currentSection;

                // num
                const tdN = document.createElement('td');
                tdN.className = 'c-num';
                tdN.textContent = isHito ? '◆' : row.id;
                tr.appendChild(tdN);

                // label
                const tdL = document.createElement('td');
                tdL.className = 'c-lbl' + (isHito ? ' lbl-hito' : isIntern ? ' lbl-intern' : '');
                tdL.textContent = row.label;
                tr.appendChild(tdL);

                // type badge
                const tdT = document.createElement('td');
                tdT.className = 'c-type';
                if (!isHito) {
                    const b = document.createElement('span');
                    b.className = `badge b-${isIntern ? 'INTERN' : row.type}`;
                    b.textContent = row.type;
                    tdT.appendChild(b);
                }
                tr.appendChild(tdT);

                // 8 week cells
                row.weeks.forEach((active, wi) => {
                    const td = document.createElement('td');
                    td.className = 'c-wk ' + WK_CLS[wi];
                    if (active) {
                        const bar = document.createElement('span');
                        if (isHito) bar.className = 'bar bar-HITO';
                        else if (isIntern) bar.className = 'bar bar-INTERN';
                        else bar.className = `bar bar-${row.type}`;
                        bar.addEventListener('mouseenter', e => showTip(e, row, wi));
                        bar.addEventListener('mousemove', e => moveTip(e));
                        bar.addEventListener('mouseleave', hideTip);
                        td.appendChild(bar);
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── TOOLTIP ───────────────────────────────────────────────────────────────
        const tip = document.getElementById('tooltip');
        const ttT = document.getElementById('tt-type');
        const ttN = document.getElementById('tt-name');
        function showTip(e, row, wi) { ttT.textContent = TYPE_LABELS[row.type] + ' · ' + WK_LABELS[wi]; ttN.textContent = row.label; tip.classList.add('visible'); moveTip(e); }
        function moveTip(e) { let x = e.clientX + 14, y = e.clientY + 14; if (x + 310 > window.innerWidth) x = e.clientX - 314; if (y + 80 > window.innerHeight) y = e.clientY - 80; tip.style.left = x + 'px'; tip.style.top = y + 'px'; }
        function hideTip() { tip.classList.remove('visible'); }

        // ── FILTERS ───────────────────────────────────────────────────────────────
        document.querySelectorAll('#view-implementacion .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#view-implementacion .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.type);
            });
        });

        function toggleSection(key) {
            if (collapsedSections.has(key)) collapsedSections.delete(key);
            else collapsedSections.add(key);
            document.querySelectorAll(`tr.row-sec[data-section="${key}"]`)
                .forEach(tr => tr.classList.toggle('collapsed', collapsedSections.has(key)));
            applyFilter(currentFilter);
        }

        function applyFilter(f) {
            currentFilter = f;
            const rows = document.querySelectorAll('#ganttBodyImp tr');
            let visible = 0;
            rows.forEach(tr => {
                if (tr.classList.contains('row-sec')) return;
                const t = tr.dataset.type;
                // PERS filter also shows CARGA; HITO always shows with ALL
                const match = f === 'ALL'
                    || t === f
                    || (f === 'PERS' && (t === 'PERS' || t === 'CARGA'));
                const collapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !match || collapsed);
                if (match && !collapsed) visible++;
            });
            // hide empty section headers
            rows.forEach(tr => {
                if (!tr.classList.contains('row-sec')) return;
                let next = tr.nextElementSibling, any = false;
                while (next && !next.classList.contains('row-sec')) {
                    if (!next.classList.contains('row-hidden')) { any = true; break; }
                    next = next.nextElementSibling;
                }
                const isCollapsed = collapsedSections.has(tr.dataset.section);
                tr.classList.toggle('row-hidden', !any && !isCollapsed);
            });
            document.getElementById('stats-pill-imp').innerHTML = `<strong>${visible}</strong> de 85 actividades`;
        }

        buildTable();
        

            window.renderGanttImp = function() { buildTable(); applyFilter(currentFilter); };
        })();

        // ── SIDEBAR TOGGLE (shared across both views) ───────────────────────────────
        const sidebarEl = document.querySelector('.sidebar');
        const sidebarToggleBtn = document.getElementById('sidebarToggle');
        function setSidebarCollapsed(collapsed) {
            sidebarEl.classList.toggle('collapsed', collapsed);
            document.body.classList.toggle('sidebar-collapsed', collapsed);
            try { localStorage.setItem('tideoSidebarCollapsed', collapsed ? '1' : '0'); } catch (e) {}
        }
        let storedCollapsed = false;
        try { storedCollapsed = localStorage.getItem('tideoSidebarCollapsed') === '1'; } catch (e) {}
        setSidebarCollapsed(storedCollapsed);
        sidebarToggleBtn.addEventListener('click', () => {
            setSidebarCollapsed(!sidebarEl.classList.contains('collapsed'));
        });

        switchView('implementacion');
    </script>

<script>
(function() {
    
    const WEEKS = [
        { n: 1, d: new Date('2026-07-20T00:00:00') },
        { n: 2, d: new Date('2026-07-27T00:00:00') },
        { n: 3, d: new Date('2026-08-03T00:00:00') },
        { n: 4, d: new Date('2026-08-10T00:00:00') },
        { n: 5, d: new Date('2026-08-17T00:00:00') },
        { n: 6, d: new Date('2026-08-24T00:00:00') },
        { n: 7, d: new Date('2026-08-31T00:00:00') },
        { n: 8, d: new Date('2026-09-07T00:00:00') },
        { n: 9, d: new Date('2026-09-14T00:00:00') },
        { n: 10, d: new Date('2026-09-21T00:00:00') }
    ];
    let currentWeek = 1;
    const now = new Date();
    for(let w of WEEKS) {
        if (now >= w.d) currentWeek = w.n;
    }
    if (currentWeek > 10) currentWeek = 10;
    
    
    
    const devCumulative = {
        1: 10, 2: 20, 3: 28, 4: 36, 5: 58, 6: 65,
        7: 72, 8: 78, 9: 84, 10: 89
    };
    const impCumulative = {
        1: 11, 2: 24, 3: 35, 4: 47, 5: 47, 6: 59,
        7: 70, 8: 77, 9: 81, 10: 85
    };
    
    const totalCurrent = devCumulative[currentWeek] + impCumulative[currentWeek];

    function updateDOM() {
        document.querySelectorAll('.val-current-week').forEach(el => el.innerHTML = currentWeek);
        document.querySelectorAll('.lbl-activities-upto').forEach(el => el.innerHTML = 'Actividades hasta S' + currentWeek);
        document.querySelectorAll('.val-activities-upto').forEach(el => el.innerHTML = totalCurrent);
        const percentage = Math.round((totalCurrent / 174) * 100);
        document.querySelectorAll('.val-percentage').forEach(el => el.innerHTML = percentage + '%');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateDOM);
    } else {
        updateDOM();
    }
})();
</script>
